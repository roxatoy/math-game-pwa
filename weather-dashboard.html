<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Панель погоды - получай погоду в реальном времени">
    <meta name="theme-color" content="#1e293b">
    <title>Панель Погоды 🌦️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .search-container input {
            padding: 12px 20px;
            border: 2px solid #334155;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            font-size: 1em;
            transition: all 0.3s;
            width: 100%;
            max-width: 400px;
        }

        .search-container input:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        .search-container button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .search-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(96, 165, 250, 0.3);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 30px 60px rgba(96, 165, 250, 0.2);
        }

        .location-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .location-name {
            font-size: 1.5em;
            font-weight: bold;
        }

        .remove-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .temperature {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-icon {
            font-size: 3.5em;
        }

        .weather-description {
            font-size: 1.2em;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-item {
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            border-left: 3px solid #60a5fa;
        }

        .detail-label {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #94a3b8;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .suggestions {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .suggestions a {
            color: #60a5fa;
            cursor: pointer;
            text-decoration: underline;
            margin: 0 5px;
        }

        .suggestions a:hover {
            color: #a78bfa;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .temperature {
                font-size: 2.5em;
            }

            .weather-icon {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌦️ Панель Погоды</h1>
            <p>Получай данные о погоде в реальном времени</p>
        </div>

        <div class="search-container">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Введи название города (например, Москва, Нью-Йорк, Лондон)"
                onkeypress="if(event.key==='Enter') searchWeather()"
            >
            <button onclick="searchWeather()">Поиск</button>
        </div>

        <div id="weatherContainer" class="weather-grid"></div>
        <div id="suggestionsContainer"></div>
    </div>

    <script>
        const API_BASE = 'https://geocoding-api.open-meteo.com/v1/search';
        const WEATHER_API = 'https://api.open-meteo.com/v1/forecast';

        // Иконки погоды
        const weatherIcons = {
            'sunny': '☀️',
            'cloudy': '☁️',
            'rainy': '🌧️',
            'snowy': '❄️',
            'stormy': '⛈️',
            'foggy': '🌫️',
            'clear': '🌙'
        };

        // Описания кодов WMO
        const weatherDescriptions = {
            0: { desc: 'Ясно', icon: '☀️' },
            1: { desc: 'Преимущественно ясно', icon: '🌤️' },
            2: { desc: 'Частично облачно', icon: '⛅' },
            3: { desc: 'Облачно', icon: '☁️' },
            45: { desc: 'Туманно', icon: '🌫️' },
            48: { desc: 'Туман с инеем', icon: '🌫️' },
            51: { desc: 'Слабая морось', icon: '🌧️' },
            53: { desc: 'Умеренная морось', icon: '🌧️' },
            55: { desc: 'Сильная морось', icon: '🌧️' },
            61: { desc: 'Слабый дождь', icon: '🌧️' },
            63: { desc: 'Умеренный дождь', icon: '🌧️' },
            65: { desc: 'Сильный дождь', icon: '⛈️' },
            71: { desc: 'Слабый снег', icon: '🌨️' },
            73: { desc: 'Умеренный снег', icon: '🌨️' },
            75: { desc: 'Сильный снег', icon: '❄️' },
            77: { desc: 'Снежные зёрна', icon: '❄️' },
            80: { desc: 'Слабкие ливни', icon: '🌧️' },
            81: { desc: 'Умеренные ливни', icon: '⛈️' },
            82: { desc: 'Сильные ливни', icon: '⛈️' },
            85: { desc: 'Слабые снежные ливни', icon: '🌨️' },
            86: { desc: 'Сильные снежные ливни', icon: '❄️' },
            95: { desc: 'Гроза', icon: '⛈️' },
            96: { desc: 'Гроза с градом', icon: '⛈️' },
            99: { desc: 'Гроза с градом', icon: '⛈️' }
        };

        let savedCities = JSON.parse(localStorage.getItem('weatherCities')) || ['Москва'];

        async function getCoordinates(city) {
            try {
                const response = await fetch(`${API_BASE}?name=${encodeURIComponent(city)}&language=ru`);
                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    throw new Error('Город не найден');
                }
                
                return data.results[0];
            } catch (error) {
                console.error('Ошибка при поиске города:', error);
                return null;
            }
        }

        async function getWeather(latitude, longitude) {
            try {
                const response = await fetch(
                    `${WEATHER_API}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto&language=ru`
                );
                return await response.json();
            } catch (error) {
                console.error('Ошибка при получении погоды:', error);
                return null;
            }
        }

        function getWeatherInfo(code) {
            return weatherDescriptions[code] || { desc: 'Неизвестно', icon: '🤷' };
        }

        async function displayWeather(city) {
            const container = document.getElementById('weatherContainer');
            
            // Показываем загрузку
            container.innerHTML = '<div class="loading">⏳ Загружаю данные о погоде...</div>';

            const coordinates = await getCoordinates(city);
            if (!coordinates) {
                container.innerHTML = `
                    <div class="error">
                        ❌ Не удалось найти город: ${city}<br>
                        <span class="suggestions">
                            Попробуй: <a onclick="searchWeather('Санкт-Петербург')">Санкт-Петербург</a>, 
                            <a onclick="searchWeather('Нью-Йорк')">Нью-Йорк</a>, 
                            <a onclick="searchWeather('Лондон')">Лондон</a>, 
                            <a onclick="searchWeather('Токио')">Токио</a>
                        </span>
                    </div>
                `;
                return;
            }

            const weather = await getWeather(coordinates.latitude, coordinates.longitude);
            if (!weather) {
                container.innerHTML = '<div class="error">❌ Ошибка при получении данных о погоде</div>';
                return;
            }

            const current = weather.current;
            const weatherInfo = getWeatherInfo(current.weather_code);
            const temp = Math.round(current.temperature_2m);
            const feelsLike = Math.round(current.apparent_temperature);

            const card = document.createElement('div');
            card.className = 'weather-card';
            card.innerHTML = `
                <div class="location-header">
                    <div class="location-name">📍 ${coordinates.name}, ${coordinates.country}</div>
                    <button class="remove-btn" onclick="removeCity('${city}')">Удалить</button>
                </div>
                
                <div class="weather-main">
                    <div class="temperature">${temp}°C</div>
                    <div class="weather-icon">${weatherInfo.icon}</div>
                </div>

                <div class="weather-description">
                    ${weatherInfo.desc}
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">Ощущается как</div>
                        <div class="detail-value">${feelsLike}°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Влажность</div>
                        <div class="detail-value">${current.relative_humidity_2m}%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Скорость ветра</div>
                        <div class="detail-value">${current.wind_speed_10m} км/ч</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Часовой пояс</div>
                        <div class="detail-value">${weather.timezone}</div>
                    </div>
                </div>
            `;

            container.appendChild(card);
        }

        async function searchWeather(city = null) {
            const input = document.getElementById('cityInput');
            const searchCity = city || input.value.trim();

            if (!searchCity) {
                alert('Пожалуйста, введи название города');
                return;
            }

            if (!savedCities.includes(searchCity)) {
                savedCities.push(searchCity);
                localStorage.setItem('weatherCities', JSON.stringify(savedCities));
            }

            input.value = '';
            loadAllWeather();
        }

        function removeCity(city) {
            savedCities = savedCities.filter(c => c !== city);
            localStorage.setItem('weatherCities', JSON.stringify(savedCities));
            loadAllWeather();
        }

        async function loadAllWeather() {
            const container = document.getElementById('weatherContainer');
            container.innerHTML = '';

            for (const city of savedCities) {
                await displayWeather(city);
            }
        }

        // Инициализация
        loadAllWeather();
    </script>
</body>
</html>
